name: Unit Tests

on:
  pull_request:
    branches: [ "test/ci-validation" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: src/app
        run: yarn install --frozen-lockfile

      - name: Run tests
        working-directory: src/app
        run: yarn test